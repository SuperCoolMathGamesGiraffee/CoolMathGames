<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Proxy Interface</title>
</head>
<body>
    <h1>Web Proxy Interface</h1>
    <form id="proxyForm">
        <label for="url">Enter URL:</label>
        <input type="text" id="url" name="url" required>
        <button type="submit">Load</button>
    </form>
    <iframe id="proxyFrame" style="width:100%; height:75vh; border:none;"></iframe>

    <script>
        document.getElementById('proxyForm').onsubmit = function(e) {
            e.preventDefault();
            const url = document.getElementById('url').value;
            document.getElementById('proxyFrame').src = url;
        };
    </script>
</body>
</html>
