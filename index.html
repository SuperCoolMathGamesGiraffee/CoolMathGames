<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cool Math Games</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        header {
            padding: 20px;
            text-align: center;
            background-color: #4CAF50;
            color: white;
        }
        nav {
            margin: 20px 0;
        }
        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #4CAF50;
        }
        .greeting {
            margin: 20px; 
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Cool Math Games!</h1>
    </header>
    <div class="greeting">
        <input type="text" id="nameInput" placeholder="Enter your name">
        <button onclick="greetUser()">Greet Me!</button>
        <p id="greetingMessage"></p>
    </div>
    <nav>
        <a href="/games.html">Games</a>
        <a href="/proxy.html">Proxy</a>
    </nav>
    <script>
        function greetUser() {
            var name = document.getElementById('nameInput').value;
            document.getElementById('greetingMessage').innerText = 'Hello, ' + name + '! Welcome to the games!';
        }
    </script>
</body>
</html>
